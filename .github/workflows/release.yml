name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            name: harness-macos
          - os: ubuntu-22.04
            platform: linux/amd64
            name: harness-linux-amd64
          - os: windows-latest
            platform: windows/amd64
            name: harness-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Linux build deps for WebKit
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform ${{ matrix.platform }} -clean

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          # zip the .app bundle so it survives download
          ditto -c -k --keepParent Harness.app ../../${{ matrix.name }}.zip

      - name: Rename Linux binary
        if: matrix.os == 'ubuntu-22.04'
        run: cp build/bin/harness ${{ matrix.name }}

      - name: Rename Windows binary
        if: matrix.os == 'windows-latest'
        run: cp build/bin/harness.exe ${{ matrix.name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.zip
          draft: false
          generate_release_notes: true
